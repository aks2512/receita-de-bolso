name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable
      - name: Run ESLint
        run: yarn lint
      - name: Run tests
        run: yarn test --runInBand
